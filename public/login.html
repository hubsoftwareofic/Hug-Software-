<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hug Software — Login</title>
  <link rel="icon" type="image/png" href="/IMG/logo.png">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary:        #008f8c;
      --primary-light:  #00d17a;
      --primary-focus:  #008f8c;
      --ink:            #1d1d1f;
      --ink-muted:      #6e6e73;
      --ink-subtle:     #aeaeb2;
      --canvas:         #ffffff;
      --canvas-input:   #f2f2f7;
      --canvas-bg:      #e8f3f3;
      --panel-dark-1:   #005451;
      --panel-dark-2:   #005451;
      --panel-dark-3:   #008f8c;
      --on-dark:        #ffffff;
      --on-dark-muted:  rgba(255,255,255,0.65);
      --radius-sm:      8px;
      --radius-md:      14px;
      --radius-lg:      22px;
      --radius-pill:    9999px;
    }

    body {
      min-height: 100vh;
      background-color: var(--canvas-bg);
      font-family: "SF Pro Text", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Centering wrapper ── */
    .stage {
      width: 100%;
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Card ── */
    .card {
      display: flex;
      width: 100%;
      max-width: 960px;
      min-height: 520px;
      border-radius: var(--radius-lg);
      overflow: hidden;
      box-shadow: rgba(0,0,0,0.10) 0 8px 40px 0, rgba(0,0,0,0.06) 0 2px 8px 0;
    }

    /* ── Left panel ── */
    .panel-left {
      flex: 0 0 42%;
      background: linear-gradient(145deg, var(--panel-dark-1) 0%, var(--panel-dark-2) 45%, var(--panel-dark-3) 100%);
      padding: 52px 44px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    /* decorative blobs */
    .panel-left::before,
    .panel-left::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      opacity: 0.18;
    }
    .panel-left::before {
      width: 300px; height: 300px;
      background: var(--primary-light);
      top: -80px; left: -80px;
    }
    .panel-left::after {
      width: 200px; height: 200px;
      background: var(--primary-light);
      bottom: -60px; right: -40px;
    }

    .brand {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 36px;
      position: relative;
      z-index: 1;
    }

    .logo-icon {
      width: 56px; height: 56px;
      background: linear-gradient(145deg, var(--primary-light), var(--primary-focus));
      border-radius: var(--radius-md);
      display: flex; align-items: center; justify-content: center;
      box-shadow: rgba(0,0,0,0.22) 3px 5px 30px 0;
    }
    .logo-icon span {
      font-size: 26px;
      font-weight: 600;
      color: var(--on-dark);
      font-family: "SF Pro Display", system-ui, -apple-system, sans-serif;
      letter-spacing: -0.28px;
    }

    .brand-name {
      font-family: "SF Pro Display", system-ui, -apple-system, sans-serif;
      font-size: 28px;
      font-weight: 600;
      color: var(--on-dark);
      letter-spacing: -0.374px;
      line-height: 1.14;
    }

    .brand-tagline {
      font-size: 14px;
      font-weight: 400;
      color: var(--on-dark-muted);
      line-height: 1.5;
      letter-spacing: -0.224px;
      max-width: 220px;
    }

    .features {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 18px;
      position: relative;
      z-index: 1;
    }

    .feature-item {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .feature-icon {
      width: 34px; height: 34px;
      background: rgba(255,255,255,0.12);
      border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .feature-icon svg {
      width: 18px; height: 18px;
      color: var(--primary-light);
    }

    .feature-label {
      font-size: 15px;
      font-weight: 400;
      color: var(--on-dark);
      letter-spacing: -0.224px;
    }

    /* ── Right panel ── */
    .panel-right {
      flex: 1;
      background: var(--canvas);
      padding: 56px 52px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .form-title {
      font-family: "SF Pro Display", system-ui, -apple-system, sans-serif;
      font-size: 34px;
      font-weight: 600;
      color: var(--ink);
      letter-spacing: -0.374px;
      line-height: 1.1;
      margin-bottom: 8px;
    }

    .form-subtitle {
      font-size: 14px;
      font-weight: 400;
      color: var(--ink-muted);
      letter-spacing: -0.224px;
      line-height: 1.43;
      margin-bottom: 36px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 20px;
    }

    label {
      font-size: 14px;
      font-weight: 400;
      color: var(--ink);
      letter-spacing: -0.224px;
    }

    .input-wrap { position: relative; }

    input[type="email"],
    input[type="password"],
    input[type="text"] {
      width: 100%;
      height: 44px;
      background: var(--canvas-input);
      border: 1px solid transparent;
      border-radius: var(--radius-md);
      padding: 0 48px 0 16px;
      font-size: 17px;
      font-family: inherit;
      font-weight: 400;
      color: var(--ink);
      letter-spacing: -0.374px;
      outline: none;
      transition: border-color 0.15s ease, background 0.15s ease;
      appearance: none;
    }

    input:focus {
      border-color: var(--primary-focus);
      background: var(--canvas);
    }

    .toggle-pw {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      color: var(--ink-subtle);
      display: flex;
      align-items: center;
      transition: color 0.15s ease;
    }
    .toggle-pw:hover { color: var(--ink-muted); }
    .toggle-pw svg { width: 20px; height: 20px; }

    .row-forgot {
      display: flex;
      justify-content: flex-end;
      margin-top: -8px;
      margin-bottom: 28px;
    }

    .link-forgot {
      font-size: 14px;
      font-weight: 400;
      color: var(--primary);
      text-decoration: none;
      letter-spacing: -0.224px;
      transition: opacity 0.15s ease;
    }
    .link-forgot:hover { opacity: 0.72; }

    .btn-primary {
      width: 100%;
      height: 52px;
      background: linear-gradient(90deg, #005451 0%, #00d17a 100%);
      border: none;
      border-radius: var(--radius-pill);
      font-family: inherit;
      font-size: 17px;
      font-weight: 600;
      color: var(--on-dark);
      letter-spacing: -0.374px;
      cursor: pointer;
      margin-bottom: 14px;
      transition: transform 0.12s ease, opacity 0.12s ease;
    }
    .btn-primary:hover  { opacity: 0.92; }
    .btn-primary:active { transform: scale(0.97); }

    .btn-secondary {
      width: 100%;
      height: 52px;
      background: transparent;
      border: 1.5px solid var(--primary);
      border-radius: var(--radius-pill);
      font-family: inherit;
      font-size: 17px;
      font-weight: 400;
      color: var(--primary);
      letter-spacing: -0.374px;
      cursor: pointer;
      transition: transform 0.12s ease, background 0.15s ease;
    }
    .btn-secondary:hover  { background: rgba(10,110,110,0.06); }
    .btn-secondary:active { transform: scale(0.97); }

    /* ── Responsive ── */
    @media (max-width: 760px) {
      body { padding: 20px 20px; }
      .card { flex-direction: column; min-height: unset; }
      .panel-left { flex: none; padding: 40px 32px; }
      .panel-right { padding: 40px 32px; }
    }
  </style>
</head>
<body>

  <div class="stage">
    <div class="card">

      <!-- Left panel -->
      <div class="panel-left">
        <div class="brand">
          <div class="logo-icon"><span>Z</span></div>
          <div class="brand-name">Hug App</div>
          <div class="brand-tagline">Sistema completo para gestão de voluntários e eventos da sua igreja.</div>
        </div>

        <ul class="features">
          <li class="feature-item">
            <div class="feature-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                <circle cx="9" cy="7" r="4"/>
                <path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/>
              </svg>
            </div>
            <span class="feature-label">Gestão de voluntários</span>
          </li>
          <li class="feature-item">
            <div class="feature-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                <line x1="16" y1="2" x2="16" y2="6"/>
                <line x1="8"  y1="2" x2="8"  y2="6"/>
                <line x1="3"  y1="10" x2="21" y2="10"/>
              </svg>
            </div>
            <span class="feature-label">Escalas inteligentes</span>
          </li>
          <li class="feature-item">
            <div class="feature-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0 1 18 0z"/>
                <circle cx="12" cy="10" r="3"/>
              </svg>
            </div>
            <span class="feature-label">Check-in com GPS</span>
          </li>
        </ul>
      </div>

      <!-- Right panel -->
      <div class="panel-right">
        <h1 class="form-title">Bem-vindo</h1>
        <p class="form-subtitle">Entre com suas credenciais para acessar</p>

        <form onsubmit="return false;">
          <div class="field">
            <label for="email">E-mail</label>
            <div class="input-wrap">
              <input type="email" id="email" placeholder="user@hug.com" autocomplete="email" />
            </div>
          </div>

          <div class="field">
            <label for="password">Senha</label>
            <div class="input-wrap">
              <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
              <button type="button" class="toggle-pw" aria-label="Mostrar senha" onclick="togglePw()">
                <svg id="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            </div>
          </div>

          <div class="row-forgot">
            <a href="#" class="link-forgot">Esqueceu a senha?</a>
          </div>

          <div id="msg-erro" style="display:none;margin-bottom:12px;padding:10px 14px;background:rgba(255,59,48,0.08);border-radius:10px;font-size:14px;color:#c0392b;letter-spacing:-0.224px;"></div>

          <button type="submit" class="btn-primary" id="btn-entrar" onclick="handleLogin()">Entrar</button>
          <button type="button" class="btn-secondary">Ativar Cadastro</button>
        </form>
      </div>

    </div>
  </div>

  <script>
    function togglePw() {
      const input = document.getElementById('password');
      const icon  = document.getElementById('eye-icon');
      const show  = input.type === 'password';
      input.type  = show ? 'text' : 'password';
      icon.innerHTML = show
        ? '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>'
        : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
    }

    async function handleLogin() {
      const email = document.getElementById('email').value.trim();
      const senha = document.getElementById('password').value;
      const btn   = document.getElementById('btn-entrar');
      const erro  = document.getElementById('msg-erro');

      erro.style.display = 'none';

      if (!email || !senha) {
        mostrarErro('Preencha e-mail e senha.');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Entrando…';

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, senha })
        });

        const dados = await res.json();

        if (!res.ok) {
          mostrarErro(dados.error || 'Erro ao fazer login.');
          return;
        }

        localStorage.setItem('access_token', dados.access_token);
        localStorage.setItem('refresh_token', dados.refresh_token);
        localStorage.setItem('expires_at', dados.expires_at);
        localStorage.setItem('usuario', JSON.stringify(dados.usuario));
        localStorage.setItem('igreja', JSON.stringify(dados.igreja));
        window.location.href = '/dashboard';

      } catch {
        mostrarErro('Não foi possível conectar ao servidor.');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Entrar';
      }
    }

    function mostrarErro(msg) {
      const erro = document.getElementById('msg-erro');
      erro.textContent = msg;
      erro.style.display = 'block';
    }

    // Redireciona se já estiver logado
    if (localStorage.getItem('token')) {
      window.location.href = '/dashboard';
    }
  </script>

</body>
</html>
